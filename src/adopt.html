<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="adopt.css">
        <script src="script.js"></script>
        <script src="adopt.js"></script>
        <title>Adopt Page</title>
    </head>

    <body>
        <h1 id="heading">Adopt...</h1>
        <img id="img" src="" alt="loading dog image...">
        <h2 id="dogName">loading dog name...</h2>

        <form id="dogForm">
            <label for="email">email:</label>
            <input id="email" name="email" type="email" required> <br /> <br />

            <label for="name">full name:</label>
            <input id="name" name="name" type="text" required> <br /> <br />

            <label for="number">phone number:</label>
            <input id="number" name="number" type="tel" required> <br /> <br />
            
            <button id="submit">send</button>
        </form>
    </body>
</html>
